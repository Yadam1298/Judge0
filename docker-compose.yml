version: '3.8'

services:
  db:
    image: postgres:16.2
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_DB: judge0

  redis:
    image: redis:7

  server:
    image: judge0/judge0:latest
    privileged: true
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - '2358:2358'

  worker:
    image: judge0/judge0:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COUNT: 2
